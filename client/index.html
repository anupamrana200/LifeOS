<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="LifeOS — your AI-powered personal second brain." />
    <script>
      (function () {
        var storageKey = 'lifeos-theme';
        var savedTheme = localStorage.getItem(storageKey);
        var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : systemTheme;
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
    <title>LifeOS</title>
  </head>
  <body>
    <noscript>LifeOS requires JavaScript to run.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
